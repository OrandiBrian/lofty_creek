database:
  - name: lofty_creek_db
    databaseName: lofty_creek_db
    plan: free

service:
  - type: web
    name: lofty-creek
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lofty_creek_db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11
      - key: SECRET_KEY
        generateValue: true
      - key: AFRICASTALKING_API_KEY
        sync: false
      - key: AFRICASTALKING_USERNAME
        value: sandbox
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@loftycreek.com
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
